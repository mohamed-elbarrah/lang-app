services:
  postgres:
    image: postgres:16-alpine
    container_name: lang-app-db
    environment:
      POSTGRES_USER: langapp
      POSTGRES_PASSWORD: langapp_secret
      POSTGRES_DB: langapp
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
